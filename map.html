<!DOCTYPE html>
<html lang="ko">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6626122704399002" crossorigin="anonymous"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지도보기 — 카페인 서울</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    body { overflow: hidden; }
    .map-layout {
      display: flex;
      height: calc(100vh - 64px);
    }

    /* ─── 좌측 패널 ─── */
    .map-sidebar {
      width: 380px; flex-shrink: 0;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-search {
      display: flex; align-items: center;
      background: var(--bg); border-radius: var(--radius-sm);
      padding: 8px 14px; gap: 8px;
      border: 1.5px solid var(--border);
      margin-bottom: 12px;
      transition: border-color .2s;
    }
    .sidebar-search:focus-within { border-color: var(--primary); }
    .sidebar-search input { flex:1; border:none; outline:none; background:transparent; font-size:.9rem; }
    .filter-chips {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .filter-chip {
      padding: 5px 12px; border-radius: 20px;
      border: 1.5px solid var(--border);
      font-size: .78rem; font-weight: 600; color: var(--text-sub);
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .filter-chip.on {
      background: var(--primary); color: #fff; border-color: var(--primary);
    }
    .sidebar-list {
      flex: 1; overflow-y: auto; padding: 8px 0;
    }
    .sidebar-list::-webkit-scrollbar { width: 4px; }
    .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .map-list-item {
      display: flex; gap: 12px; padding: 14px 20px;
      cursor: pointer; border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    .map-list-item:hover, .map-list-item.active { background: var(--bg-warm); }
    .map-list-item.active { border-left: 3px solid var(--primary); }
    .map-list-thumb {
      width: 72px; height: 72px; border-radius: var(--radius-sm);
      object-fit: cover; flex-shrink: 0;
    }
    .map-list-body { flex: 1; min-width: 0; }
    .map-list-name { font-size: .95rem; font-weight: 700; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .map-list-loc { font-size: .8rem; color: var(--text-muted); margin-bottom: 5px; }
    .map-list-meta { display: flex; align-items: center; gap: 8px; }
    .map-list-rating { font-size: .82rem; font-weight: 700; color: var(--text-main); }
    .map-list-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .map-list-tag {
      background: var(--bg-warm); color: var(--primary-light);
      padding: 2px 8px; border-radius: 20px; font-size: .72rem; font-weight: 600;
    }
    .sidebar-count {
      padding: 10px 20px; background: var(--bg-warm);
      font-size: .82rem; color: var(--text-muted); font-weight: 500;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }

    /* ─── 우측 지도 ─── */
    .map-area {
      flex: 1; position: relative; background: #E8E3DB;
      overflow: hidden;
    }
    /* SVG 서울 지도 배경 */
    .map-bg {
      width: 100%; height: 100%; position: absolute; inset: 0;
    }
    /* 카페 핀 */
    .cafe-pin {
      position: absolute; transform: translate(-50%, -100%);
      cursor: pointer; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
    }
    .pin-bubble {
      background: var(--primary); color: #fff;
      padding: 5px 10px; border-radius: 20px;
      font-size: .78rem; font-weight: 700; white-space: nowrap;
      box-shadow: var(--shadow-md);
      transition: all .2s;
    }
    .pin-bubble:hover, .cafe-pin.active .pin-bubble {
      background: var(--accent); color: var(--primary); transform: scale(1.12);
    }
    .pin-tail {
      width: 0; height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 8px solid var(--primary);
      margin-top: -1px;
      transition: border-top-color .2s;
    }
    .cafe-pin.active .pin-tail { border-top-color: var(--accent); }

    /* 팝업 카드 */
    .map-popup {
      position: absolute; z-index: 20;
      background: #fff; border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      width: 260px; padding: 16px;
      display: none;
      animation: popIn .2s ease;
    }
    @keyframes popIn {
      from { opacity:0; transform: scale(.9) translateY(8px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }
    .popup-close {
      position: absolute; top: 10px; right: 10px;
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--bg); display: flex; align-items: center; justify-content: center;
      font-size: .9rem; cursor: pointer;
    }
    .popup-img { width: 100%; height: 130px; object-fit: cover; border-radius: var(--radius-sm); margin-bottom: 10px; }
    .popup-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
    .popup-tag { background: var(--bg-warm); color: var(--primary-light); padding: 2px 8px; border-radius: 20px; font-size: .72rem; font-weight: 600; }
    .popup-name { font-size: 1rem; font-weight: 800; margin-bottom: 4px; }
    .popup-loc { font-size: .8rem; color: var(--text-muted); margin-bottom: 8px; }
    .popup-btn {
      display: block; width: 100%; padding: 9px;
      background: var(--primary); color: #fff; border-radius: var(--radius-sm);
      font-size: .88rem; font-weight: 700; text-align: center;
      transition: background .2s;
    }
    .popup-btn:hover { background: var(--primary-light); }

    /* 지도 컨트롤 */
    .map-controls {
      position: absolute; right: 16px; top: 16px; z-index: 15;
      display: flex; flex-direction: column; gap: 6px;
    }
    .map-ctrl-btn {
      width: 40px; height: 40px; background: #fff;
      border-radius: var(--radius-sm); box-shadow: var(--shadow-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; cursor: pointer; font-weight: 700;
      transition: box-shadow .2s;
    }
    .map-ctrl-btn:hover { box-shadow: var(--shadow-md); }

    /* 지역 표시 레이블 */
    .district-label {
      position: absolute; font-size: .75rem; font-weight: 700;
      color: var(--text-muted); pointer-events: none;
      background: rgba(255,255,255,.6); padding: 3px 7px; border-radius: 10px;
    }

    @media(max-width:768px) {
      .map-sidebar { width: 100%; height: 50%; }
      .map-layout { flex-direction: column; }
      .map-area { height: 50%; }
    }
  </style>
</head>
<body>

<!-- GNB -->
<header class="gnb">
  <div class="gnb-inner">
    <a href="index.html" class="gnb-logo">
      <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" fill="#6B4226"/><path d="M8 10 Q10 8 12 10 Q14 12 16 10 Q18 8 20 10" stroke="#F5E6D3" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M8 18 Q14 20 20 18 Q20 22 14 23 Q8 22 8 18Z" fill="#F5E6D3"/></svg>
      카페인 서울
    </a>
    <nav class="gnb-nav">
      <a href="index.html">홈</a>
      <a href="region.html">지역별</a>
      <a href="index.html#themeGrid">테마별</a>
      <a href="map.html" class="active">지도보기</a>
      <a href="community.html">커뮤니티</a>
      <a href="help.html">도움말</a>
    </nav>
    <div class="gnb-actions">
      <button class="btn-ghost">회원가입</button>
      <button class="btn-login">로그인</button>
    </div>
  </div>
</header>

<div class="map-layout">

  <!-- 좌측 사이드바 -->
  <aside class="map-sidebar">
    <div class="sidebar-header">
      <div class="sidebar-search">
        <span>🔍</span>
        <input type="text" id="mapSearch" placeholder="카페명, 지역, 태그 검색..." oninput="filterMapList()" />
      </div>
      <div class="filter-chips" id="filterChips">
        <div class="filter-chip" onclick="toggleFilter(this,'전체')">전체</div>
        <div class="filter-chip" onclick="toggleFilter(this,'작업하기좋은')">💻 작업</div>
        <div class="filter-chip" onclick="toggleFilter(this,'데이트코스')">💑 데이트</div>
        <div class="filter-chip" onclick="toggleFilter(this,'반려동물동반')">🐾 펫동반</div>
        <div class="filter-chip" onclick="toggleFilter(this,'인스타감성')">📸 감성</div>
      </div>
    </div>
    <div class="sidebar-count" id="sidebarCount">카페 8개</div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <!-- 우측 지도 -->
  <div class="map-area" id="mapArea">
    <!-- 서울 지도 SVG 배경 -->
    <svg class="map-bg" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="mapGrad" cx="50%" cy="50%" r="70%">
          <stop offset="0%" stop-color="#EDE8E0"/>
          <stop offset="100%" stop-color="#D8D0C4"/>
        </radialGradient>
        <filter id="blur2"><feGaussianBlur stdDeviation="2"/></filter>
      </defs>
      <!-- 배경 -->
      <rect width="900" height="700" fill="url(#mapGrad)"/>
      <!-- 한강 -->
      <path d="M 60 340 Q 200 320 350 330 Q 500 340 650 325 Q 750 315 860 320"
            stroke="#A8CADF" stroke-width="28" fill="none" opacity=".6" stroke-linecap="round"/>
      <path d="M 60 340 Q 200 320 350 330 Q 500 340 650 325 Q 750 315 860 320"
            stroke="#C5DCE8" stroke-width="18" fill="none" opacity=".5" stroke-linecap="round"/>
      <!-- 지하철선 (2호선 느낌) -->
      <ellipse cx="440" cy="290" rx="200" ry="130"
               stroke="#4CAF50" stroke-width="5" fill="none" opacity=".3" stroke-dasharray="8,4"/>
      <!-- 서울 외곽 윤곽 느낌 -->
      <path d="M150 80 Q280 50 450 60 Q620 70 750 120 Q820 160 840 250
               Q860 360 820 450 Q780 520 700 560 Q600 600 480 610
               Q350 620 250 580 Q160 545 120 470 Q80 400 90 310 Q100 200 150 80Z"
            fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.4)" stroke-width="2"/>
      <!-- 도로 -->
      <line x1="450" y1="0" x2="450" y2="700" stroke="rgba(255,255,255,.5)" stroke-width="3"/>
      <line x1="0" y1="330" x2="900" y2="330" stroke="rgba(255,255,255,.5)" stroke-width="3"/>
      <line x1="200" y1="0" x2="300" y2="700" stroke="rgba(255,255,255,.25)" stroke-width="2"/>
      <line x1="0" y1="200" x2="900" y2="250" stroke="rgba(255,255,255,.25)" stroke-width="2"/>
      <line x1="0" y1="450" x2="900" y2="420" stroke="rgba(255,255,255,.25)" stroke-width="2"/>
    </svg>

    <!-- 지역 레이블 -->
    <div class="district-label" style="left:42%;top:16%">종로·북촌</div>
    <div class="district-label" style="left:55%;top:22%">성수동</div>
    <div class="district-label" style="left:24%;top:28%">마포·홍대</div>
    <div class="district-label" style="left:38%;top:55%">이태원·한남</div>
    <div class="district-label" style="left:60%;top:62%">강남·청담</div>
    <div class="district-label" style="left:72%;top:30%">광진·건대</div>

    <!-- 카페 핀 (JS로 렌더) -->
    <div id="pinLayer"></div>

    <!-- 팝업 카드 -->
    <div class="map-popup" id="mapPopup">
      <div class="popup-close" onclick="closePopup()">✕</div>
      <img id="popupImg" src="" alt="" class="popup-img" />
      <div class="popup-tags" id="popupTags"></div>
      <div class="popup-name" id="popupName"></div>
      <div class="popup-loc" id="popupLoc"></div>
      <a id="popupBtn" href="#" class="popup-btn">상세 페이지 보기 →</a>
    </div>

    <!-- 지도 컨트롤 -->
    <div class="map-controls">
      <div class="map-ctrl-btn" title="현재 위치">📍</div>
      <div class="map-ctrl-btn" title="확대" onclick="zoomMap(1.15)">＋</div>
      <div class="map-ctrl-btn" title="축소" onclick="zoomMap(0.87)">－</div>
      <div class="map-ctrl-btn" title="초기화" onclick="resetZoom()">⊙</div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
/* ─── 카페 핀 위치 (지도 % 좌표) ─── */
const PIN_POS = {
  1: { x: 57, y: 24 },   // 성수동
  2: { x: 44, y: 18 },   // 북촌
  3: { x: 25, y: 32 },   // 마포
  4: { x: 52, y: 40 },   // 한남동
  5: { x: 23, y: 30 },   // 연남동
  6: { x: 56, y: 26 },   // 성수동
  7: { x: 62, y: 60 },   // 청담동
  8: { x: 38, y: 19 },   // 서촌
};

let activePin = null;
let currentScale = 1;
let activeFilters = new Set(['전체']);

/* ─── 핀 렌더 ─── */
function renderPins(list) {
  const area = document.getElementById('pinLayer');
  area.innerHTML = list.map(cafe => {
    const pos = PIN_POS[cafe.id];
    if (!pos) return '';
    return `
      <div class="cafe-pin" id="pin${cafe.id}"
           style="left:${pos.x}%; top:${pos.y}%"
           onclick="selectCafe(${cafe.id})">
        <div class="pin-bubble">${cafe.name}</div>
        <div class="pin-tail"></div>
      </div>`;
  }).join('');
}

/* ─── 사이드바 리스트 ─── */
function renderSidebarList(list) {
  document.getElementById('sidebarCount').textContent = `카페 ${list.length}개`;
  document.getElementById('sidebarList').innerHTML = list.map(cafe => `
    <div class="map-list-item" id="item${cafe.id}" onclick="selectCafe(${cafe.id})">
      <img class="map-list-thumb" src="${cafe.images[0]}" alt="${cafe.name}" loading="lazy" />
      <div class="map-list-body">
        <div class="map-list-name">${cafe.name}</div>
        <div class="map-list-loc">📍 ${cafe.district} · ${cafe.station}역</div>
        <div class="map-list-meta">
          <span class="map-list-rating">★ ${cafe.rating}</span>
          <div class="map-list-tags">
            ${cafe.tags.slice(0,2).map(t=>`<span class="map-list-tag">#${t}</span>`).join('')}
          </div>
        </div>
      </div>
    </div>`).join('');
}

/* ─── 카페 선택 ─── */
function selectCafe(id) {
  const cafe = CAFES.find(c => c.id === id);
  if (!cafe) return;

  document.querySelectorAll('.cafe-pin').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.map-list-item').forEach(i => i.classList.remove('active'));
  document.getElementById(`pin${id}`)?.classList.add('active');
  document.getElementById(`item${id}`)?.classList.add('active');
  document.getElementById(`item${id}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  showPopup(cafe);
}

/* ─── 팝업 ─── */
function showPopup(cafe) {
  const popup = document.getElementById('mapPopup');
  const pos = PIN_POS[cafe.id];
  document.getElementById('popupImg').src = cafe.images[0];
  document.getElementById('popupName').textContent = cafe.name;
  document.getElementById('popupLoc').textContent = `📍 ${cafe.district} · ${cafe.station}역  ★ ${cafe.rating}`;
  document.getElementById('popupTags').innerHTML = cafe.tags.slice(0,3).map(t=>`<span class="popup-tag">#${t}</span>`).join('');
  document.getElementById('popupBtn').href = `cafe-detail.html?id=${cafe.id}`;

  const area = document.getElementById('mapArea');
  const aw = area.clientWidth, ah = area.clientHeight;
  if (pos) {
    let left = (pos.x / 100) * aw;
    let top = (pos.y / 100) * ah;
    left = Math.min(Math.max(left - 130, 8), aw - 276);
    top = Math.max(top - 240, 8);
    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
  }
  popup.style.display = 'block';
}
function closePopup() {
  document.getElementById('mapPopup').style.display = 'none';
  document.querySelectorAll('.cafe-pin').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.map-list-item').forEach(i => i.classList.remove('active'));
}

/* ─── 필터 ─── */
function toggleFilter(el, tag) {
  if (tag === '전체') {
    activeFilters = new Set(['전체']);
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('on'));
    el.classList.add('on');
  } else {
    activeFilters.delete('전체');
    document.querySelector('.filter-chip').classList.remove('on');
    el.classList.toggle('on');
    if (el.classList.contains('on')) activeFilters.add(tag);
    else activeFilters.delete(tag);
    if (activeFilters.size === 0) { activeFilters.add('전체'); document.querySelector('.filter-chip').classList.add('on'); }
  }
  applyFilters();
}

function filterMapList() {
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('mapSearch').value.trim().toLowerCase();
  let list = CAFES;
  if (!activeFilters.has('전체')) {
    list = list.filter(c => c.tags.some(t => activeFilters.has(t)));
  }
  if (q) {
    list = list.filter(c =>
      c.name.includes(q) || c.district.includes(q) || c.station.includes(q) ||
      c.tags.some(t => t.includes(q))
    );
  }
  renderSidebarList(list);
  renderPins(list);
  closePopup();
}

/* ─── 줌 (CSS transform) ─── */
function zoomMap(factor) {
  currentScale = Math.min(Math.max(currentScale * factor, 0.6), 3);
  document.getElementById('pinLayer').style.transform = `scale(${currentScale})`;
  document.getElementById('pinLayer').style.transformOrigin = 'center center';
}
function resetZoom() {
  currentScale = 1;
  document.getElementById('pinLayer').style.transform = 'scale(1)';
}

/* ─── Init ─── */
document.querySelector('.filter-chip').classList.add('on');
renderSidebarList(CAFES);
renderPins(CAFES);
</script>
</body>
</html>
